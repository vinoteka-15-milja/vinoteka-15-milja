name: Deploy na cPanel (15milja.com)

# Svaki push na main → automatski upload na cPanel preko FTP-a.
# Prvi put uploaduje ceo sajt; kasnije šalje samo izmenjene fajlove.
on:
  push:
    branches: [ main ]
  workflow_dispatch:        # ručno pokretanje iz GitHub Actions taba

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP upload na public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 88.198.1.66
          username: miljacom
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: public_html/
          # Idu samo fajlovi sajta — sve ostalo (kod-alati, dokumentacija) se preskače
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.DS_Store
            **/node_modules/**
            .superpowers/**
            .playwright-mcp/**
            .claude/**
            *.md
            *.csv
            *.json
            *.scad
            Dockerfile
            docker-compose.yml
            .dockerignore
