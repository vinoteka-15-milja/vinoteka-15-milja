name: Deploy na cPanel (15milja.com)

# push na main → glavni sajt (public_html)
# push na dev  → dev podsajt (public_html/dev)  = dev.15milja.com
on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Odredi ciljni folder po grani
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "dir=public_html/" >> "$GITHUB_OUTPUT"
          else
            echo "dir=public_html/dev/" >> "$GITHUB_OUTPUT"
          fi

      - name: FTP upload
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 88.198.1.66
          username: miljacom
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ steps.target.outputs.dir }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.DS_Store
            **/node_modules/**
            .superpowers/**
            .playwright-mcp/**
            .claude/**
            tools/**
            wp-theme/**
            docs/**
            *.md
            *.csv
            *.json
            *.scad
            Dockerfile
            docker-compose.yml
            .dockerignore
